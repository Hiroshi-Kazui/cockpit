<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cockpit — 完成形ストーリーボード（紙芝居モック）</title>
<style>
  :root{
    --bg:#1e1e1e; --panel:#252526; --panel2:#2d2d30; --term:#0c0c0c;
    --border:#3a3a3a; --border-soft:#333;
    --text:#d4d4d4; --muted:#9d9d9d; --muted2:#b8b8b8;
    --accent:#d97757;      /* claude clay */
    --teal:#4ec9b0; --blue:#569cd6; --yellow:#dcdcaa; --red:#f48771; --purple:#c586c0; --green:#89d185;
    --shadow:0 18px 50px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 700px at 50% -10%, #2a2a2c, #141416 60%);
    color:var(--text); font-family:"Segoe UI",system-ui,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:22px 16px 40px;
  }
  .mono{font-family:"Cascadia Code",Consolas,"Courier New",monospace}

  /* ---- viewer chrome ---- */
  .viewer{width:1160px; max-width:100%;}
  .caption{
    display:flex; align-items:flex-start; gap:14px; margin-bottom:12px;
  }
  .badge{
    flex:0 0 auto; font-size:12px; font-weight:700; letter-spacing:.04em;
    color:#1e1e1e; background:var(--accent); border-radius:6px; padding:5px 9px; margin-top:2px;
  }
  .caption h1{font-size:16px; margin:0 0 3px; font-weight:600}
  .caption p{margin:0; font-size:13px; color:var(--muted2); line-height:1.5}

  /* ---- app window ---- */
  .window{
    height:700px; background:var(--bg); border:1px solid var(--border);
    border-radius:10px; overflow:hidden; box-shadow:var(--shadow);
    display:flex; flex-direction:column;
  }
  .titlebar{
    height:38px; flex:0 0 auto; background:#181819; border-bottom:1px solid var(--border-soft);
    display:flex; align-items:center; padding:0 12px; gap:12px;
  }
  .lights{display:flex; gap:7px}
  .lights i{width:12px;height:12px;border-radius:50%}
  .lights .r{background:#ff5f57}.lights .y{background:#febc2e}.lights .g{background:#28c840}
  .appname{font-size:13px;font-weight:600;color:#cfcfcf;display:flex;align-items:center;gap:7px}
  .appname .dot{width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .toolbar{margin-left:auto; display:flex; align-items:center; gap:8px}
  .seg{display:flex; background:var(--panel); border:1px solid var(--border-soft); border-radius:7px; overflow:hidden}
  .seg button{
    background:transparent; border:0; color:var(--muted2); font-size:12px; padding:5px 11px; cursor:pointer;
    border-right:1px solid var(--border-soft)
  }
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--accent); color:#1e1e1e; font-weight:700}
  .tbtn{background:var(--panel); border:1px solid var(--border-soft); color:var(--muted2); font-size:12px; padding:5px 11px; border-radius:7px; cursor:pointer}
  .tbtn.on{color:var(--accent); border-color:var(--accent)}

  /* ---- grid ---- */
  .body{flex:1 1 auto; position:relative; overflow:hidden}
  .grid{position:absolute; inset:0; display:grid; gap:1px; background:var(--border-soft); padding:1px}
  .grid.l4{grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr}
  .grid.l2{grid-template-columns:1fr 1fr; grid-template-rows:1fr}
  .grid.l1{grid-template-columns:1fr; grid-template-rows:1fr}
  .grid.l2 .pane:nth-child(n+3),.grid.l1 .pane:nth-child(n+2){display:none}

  /* ---- pane ---- */
  .pane{background:var(--term); display:flex; flex-direction:column; overflow:hidden; position:relative}
  .pane.focus{outline:2px solid var(--accent); outline-offset:-2px}
  .phead{flex:0 0 auto; background:var(--panel); border-bottom:1px solid var(--border-soft); padding:7px 10px; display:flex; gap:10px; align-items:flex-start}
  .pmeta{min-width:0; flex:1 1 auto}
  .ptitle{font-size:12.5px; font-weight:600; color:#e6e6e6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:6px}
  .ptitle .sd{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .sd.run{background:var(--green); box-shadow:0 0 6px var(--green)}
  .sd.idle{background:var(--muted)}
  .sd.done{background:var(--blue)}
  .ppurpose{font-size:11px; color:var(--muted2); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .pcwd{font-size:10px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .pright{flex:0 0 auto; display:flex; flex-direction:column; align-items:flex-end; gap:6px}
  .pbtns{display:flex; gap:6px}
  .pbtn{font-size:10.5px; padding:3px 8px; border-radius:5px; border:1px solid var(--border); background:var(--panel2); color:var(--muted2); cursor:pointer}
  .pbtn.accent{border-color:var(--accent); color:var(--accent)}
  .pbtn.done{border-color:var(--blue); color:var(--blue)}
  .pbtn:disabled{opacity:.4; cursor:not-allowed}

  /* context gauge (compact までの目安) */
  .tok{width:170px}
  .tok .lab{font-size:9.5px; color:var(--muted); display:flex; justify-content:space-between; margin-bottom:2px}
  .tok .lab .pct{font-weight:700}
  .tok .bar{height:7px; border-radius:4px; overflow:hidden; background:#0e0e0e; border:1px solid #000}
  .tok .bar i{display:block; height:100%; border-radius:3px}
  .ctx-g{background:var(--green)} .ctx-o{background:#e0a54a} .ctx-r{background:var(--red)}
  .lab-g{color:var(--green)} .lab-o{color:#e0a54a} .lab-r{color:var(--red)}

  /* terminal body */
  .pterm{flex:1 1 auto; padding:9px 11px; overflow:hidden; font-size:11.5px; line-height:1.55}
  .pterm .cursor{display:inline-block;width:7px;height:13px;background:var(--text);vertical-align:middle;animation:bl 1.1s step-end infinite}
  @keyframes bl{50%{opacity:0}}
  .c-dim{color:#6a6a6a}.c-accent{color:var(--accent)}.c-green{color:var(--green)}.c-blue{color:var(--blue)}
  .c-teal{color:var(--teal)}.c-yellow{color:var(--yellow)}.c-red{color:var(--red)}.c-purple{color:var(--purple)}
  .c-user{color:#cfcfcf}.c-mut{color:var(--muted)}
  .box{border:1px solid #3a3a3a;border-radius:6px;padding:7px 9px;margin:6px 0;background:#151515}
  .sel{color:var(--accent)}

  /* empty pane */
  .pempty{flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted)}
  .pempty .big{font-size:13px}
  .pempty .setbtn{font-size:12px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer}
  .pempty .setbtn.accent{border-color:var(--accent);color:var(--accent)}
  .resume-wrap{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:0 18px}
  .resume-wrap .rt{font-size:13px;color:#e6e6e6;font-weight:600}
  .resume-wrap .rp{font-size:11px;color:var(--muted2)}
  .resume-wrap .rbtn{margin-top:6px;font-size:13px;padding:8px 20px;border-radius:8px;border:1px solid var(--accent);background:rgba(217,119,87,.12);color:var(--accent);cursor:pointer;font-weight:600}
  .banner{position:absolute;left:0;right:0;top:0;background:#3a1d18;border-bottom:1px solid var(--red);color:#f0b8a8;font-size:11px;padding:6px 10px;z-index:3}

  /* ---- status bar ---- */
  .status{flex:0 0 auto; height:38px; background:#181819; border-top:1px solid var(--border-soft); display:flex; align-items:center; padding:0 14px; gap:22px; font-size:11.5px}
  .status .left{color:var(--muted); display:flex; gap:14px; align-items:center}
  .status .est{color:#1e1e1e;background:var(--yellow);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700}
  .gauges{margin-left:auto; display:flex; gap:26px}
  .gauge{display:flex; align-items:center; gap:9px}
  .gauge .gl{color:var(--muted2)}
  .gauge .gbar{width:120px;height:8px;border-radius:5px;background:#2a2a2a;overflow:hidden;border:1px solid #000}
  .gauge .gbar i{display:block;height:100%}
  .gfill-ok{background:var(--teal)} .gfill-mid{background:var(--yellow)} .gfill-low{background:var(--red)}
  .gauge .gv{color:#e6e6e6;font-weight:600;min-width:56px}
  .gauge .gr{color:var(--muted);font-size:10.5px}

  /* ---- dialog ---- */
  .backdrop{position:absolute; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:5}
  .dialog{width:440px; background:var(--panel); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
  .dialog h3{margin:0; padding:14px 18px; font-size:14px; border-bottom:1px solid var(--border-soft); background:var(--panel2)}
  .dialog .dc{padding:16px 18px; display:flex; flex-direction:column; gap:12px}
  .dialog label{font-size:12px; color:var(--muted2)}
  .dialog textarea{width:100%; height:78px; resize:none; background:var(--term); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; padding:9px 11px; font-family:inherit}
  .dialog .folder{display:flex; gap:8px; align-items:center}
  .dialog .folder input{flex:1; background:var(--term); border:1px solid var(--border); border-radius:8px; color:var(--muted2); font-size:12px; padding:7px 10px}
  .dialog .folder button,.dialog .row button{font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer}
  .dialog .row{display:flex; justify-content:flex-end; gap:10px; padding-top:4px}
  .dialog .row .primary{background:var(--accent); border-color:var(--accent); color:#1e1e1e; font-weight:700}

  /* ---- sessions view ---- */
  .sessions{position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column}
  .shead{padding:12px 16px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; gap:12px}
  .shead h2{margin:0;font-size:14px;font-weight:600}
  .shead .ro{font-size:10.5px;color:#1e1e1e;background:var(--muted2);border-radius:4px;padding:2px 7px;font-weight:700}
  .shead input{margin-left:auto; width:240px; background:var(--panel); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12px; padding:7px 11px}
  .stable{flex:1;overflow:auto}
  table{width:100%; border-collapse:collapse; font-size:12px}
  thead th{position:sticky;top:0;background:var(--panel2); text-align:left; color:var(--muted2); font-weight:600; padding:9px 14px; border-bottom:1px solid var(--border-soft); font-size:11px}
  tbody td{padding:9px 14px; border-bottom:1px solid #262626; color:var(--text)}
  tbody tr:hover{background:var(--panel)}
  td .st{font-weight:600}
  td .sub{color:var(--muted); font-size:11px}
  .pill{font-size:10px;padding:1px 7px;border-radius:10px;border:1px solid var(--border)}
  .pill.active{color:var(--green);border-color:var(--green)}
  .pill.completed{color:var(--blue);border-color:var(--blue)}
  .num{font-variant-numeric:tabular-nums;color:var(--muted2)}

  /* ---- nav ---- */
  .nav{display:flex; align-items:center; gap:16px; margin-top:16px; justify-content:center}
  .nav button{width:44px;height:44px;border-radius:50%;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .nav button:hover{border-color:var(--accent);color:var(--accent)}
  .dots{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:640px}
  .dots i{width:10px;height:10px;border-radius:50%;background:#3a3a3a;cursor:pointer;transition:.15s}
  .dots i.on{background:var(--accent);transform:scale(1.25)}
  .counter{font-size:12px;color:var(--muted); min-width:46px; text-align:center}
  .hint{margin-top:12px;font-size:11.5px;color:var(--muted);text-align:center}
  kbd{background:var(--panel);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;font-family:inherit}
</style>
</head>
<body>
  <div class="viewer">
    <div class="caption">
      <span class="badge" id="cap-badge">M1</span>
      <div>
        <h1 id="cap-title">タイトル</h1>
        <p id="cap-desc">説明</p>
      </div>
    </div>
    <div class="window" id="stage"></div>
    <div class="nav">
      <button id="prev" aria-label="前へ">‹</button>
      <div class="counter" id="counter">1 / 8</div>
      <button id="next" aria-label="次へ">›</button>
      <button id="play" aria-label="自動再生" style="width:auto;border-radius:22px;padding:0 16px;font-size:13px">▶ 自動再生</button>
    </div>
    <div class="dots" id="dots"></div>
    <div class="hint">← → キー、○、左右ボタン、または「▶ 自動再生」（5秒ごと）で紙芝居を送れます　/　これは <b>cockpit 完成形（M1〜M5）</b> の見た目モックです（実アプリではありません）</div>
  </div>

<script>
/* ============ helpers ============ */
/* コンテキスト使用量ゲージ: compact が必要になるまでの目安。
   〜59% 緑 / 60〜84% オレンジ / 85%〜 赤 */
function ctxGauge(p){
  const pct = p.ctx ?? 0;
  const cls = pct>=85?'r': pct>=60?'o':'g';
  const k = n => n>=1000? (n/1000).toFixed(1)+'k' : (n||0);
  const t = p.tokens? (k(p.tokens.in+p.tokens.out+p.tokens.cr+p.tokens.cw)+' tok') : '';
  return `<div class="tok">
    <div class="lab"><span>context（compactまで）</span><span class="pct lab-${cls}">${pct}%</span></div>
    <div class="bar"><i class="ctx-${cls}" style="width:${pct}%"></i></div>
    <div class="lab" style="margin-top:2px"><span>${t}</span><span>残り ${100-pct}%</span></div>
  </div>`;
}
function term(lines){ return `<div class="pterm mono">${lines.join('<br>')}</div>`; }

/* pane renderer */
function pane(p, focused){
  const cls = 'pane'+(focused?' focus':'');
  if(p.state==='empty'){
    return `<div class="${cls}">
      <div class="phead"><div class="pmeta">
        <div class="ptitle"><span class="sd idle"></span>ペイン ${p.n}</div>
        <div class="pcwd">${p.cwd||'（フォルダ未設定）'}</div>
      </div></div>
      <div class="pempty">
        <div class="big">${p.cwd?'このフォルダで claude を起動できます':'まずデフォルトフォルダを設定してください'}</div>
        <button class="setbtn ${p.cwd?'accent':''}">${p.cwd?'＋ 新規セッション':'📁 フォルダを選択'}</button>
        ${p.cwd?'':'<div class="pcwd">設定は SQLite に保存され再起動後も復元されます</div>'}
      </div>
    </div>`;
  }
  if(p.state==='resume'){
    return `<div class="${cls}">
      <div class="phead"><div class="pmeta">
        <div class="ptitle"><span class="sd idle"></span>${p.title}</div>
        <div class="ppurpose">目的: ${p.purpose}</div>
        <div class="pcwd">${p.cwd}</div>
      </div><div class="pright"><div class="pbtns"><button class="pbtn" disabled>完了</button></div></div></div>
      <div class="resume-wrap">
        <div class="rt">◷ 継続中の目的があります</div>
        <div class="rp">前回の会話を <span class="mono">--continue</span> で復元します（自動起動はしません）</div>
        <button class="rbtn">▶ 再開</button>
      </div>
    </div>`;
  }
  // sessioned states: launching / running / permission / completed
  const sd = p.state==='completed' ? 'done' : (p.state==='launching'?'idle':'run');
  const doneBtn = p.state==='completed'
    ? `<button class="pbtn done">完了済み</button>`
    : `<button class="pbtn">完了</button>`;
  return `<div class="${cls}">
    <div class="phead">
      <div class="pmeta">
        <div class="ptitle"><span class="sd ${sd}"></span>${p.title}</div>
        <div class="ppurpose">目的: ${p.purpose}</div>
        <div class="pcwd">${p.model?('◆ '+p.model+'　'):''}${p.cwd}</div>
      </div>
      <div class="pright">
        ${ctxGauge(p)}
        <div class="pbtns">${doneBtn}</div>
      </div>
    </div>
    ${term(p.term||[])}
  </div>`;
}

function statusbar(s){
  if(!s) return '';
  const fillClass = r => r>=50?'gfill-ok': r>=25?'gfill-mid':'gfill-low';
  const g = (label,remain,reset)=>`<div class="gauge">
     <span class="gl">${label}</span>
     <span class="gbar"><i class="${fillClass(remain)}" style="width:${remain}%"></i></span>
     <span class="gv">残り ${remain}%</span>
     <span class="gr">↻ ${reset}</span></div>`;
  return `<div class="status">
    <div class="left">
      <span>● ${s.active} セッション稼働中</span>
      ${s.estimated?'<span class="est">推定</span>':'<span class="gr">rate_limits: 実測（Anthropic サーバ由来）</span>'}
    </div>
    <div class="gauges">
      ${g('5時間', s.h5.r, s.h5.reset)}
      ${g('週次', s.week.r, s.week.reset)}
    </div>
  </div>`;
}

function render(sc){
  const layoutClass = 'l'+(sc.layout||4);
  const on = l => sc.layout===l?'on':'';
  let bodyInner;
  if(sc.view==='sessions'){
    bodyInner = renderSessions();
  } else {
    const panes = sc.panes.map((p,i)=>pane(p, sc.focus===i)).join('');
    bodyInner = `<div class="grid ${layoutClass}">${panes}</div>`;
    if(sc.dialog) bodyInner += `<div class="backdrop">${renderDialog(sc.dialog)}</div>`;
  }
  document.getElementById('stage').innerHTML = `
    <div class="titlebar">
      <div class="lights"><i class="r"></i><i class="y"></i><i class="g"></i></div>
      <div class="appname"><span class="dot"></span>cockpit</div>
      <div class="toolbar">
        <div class="seg">
          <button class="${on(1)}">単一</button>
          <button class="${on(2)}">2分割</button>
          <button class="${on(4)}">4分割</button>
        </div>
        <button class="tbtn ${sc.view==='sessions'?'on':''}">🗂 過去セッション</button>
      </div>
    </div>
    <div class="body">${bodyInner}</div>
    ${sc.view==='sessions'? '' : statusbar(sc.statusbar)}
  `;
}

function renderDialog(d){
  return `<div class="dialog">
    <h3>新規セッション — ペイン ${d.pane} の目的</h3>
    <div class="dc">
      <label>このセッションで達成したいこと（完了操作するまで継続します）</label>
      <textarea>${d.text}</textarea>
      <label>作業フォルダ（cwd）</label>
      <div class="folder"><input value="${d.cwd}" readonly><button>変更</button></div>
      <div class="row"><button>キャンセル</button><button class="primary">開始 ▶</button></div>
    </div>
  </div>`;
}

function renderSessions(){
  const rows = [
    ['README にセットアップ手順を追記','READMEにセットアップ手順を追記して','completed','1','sonnet','8.9k','07-19 13:42→14:07','C:\\develop\\cockpit'],
    ['pty リサイズ伝播のバグ調査','ペインリサイズがptyに伝わらない不具合を直す','completed','2','sonnet','21.3k','07-19 12:10→13:30','C:\\develop\\cockpit'],
    ['ステータスバー残量表示の実装','5h/週次の残量をステータスバーに出す','active','3','opus','44.1k','07-19 14:05→（継続中）','C:\\develop\\suslab\\terrast'],
    ['claude 実体解決ロジックの設計','WindowsでのCLI spawnをTD-5通り実装','completed','1','sonnet','15.0k','07-18 19:20→20:02','C:\\develop\\cockpit'],
    ['JSONL アーカイブ同期','transcript_pathを追記監視してコピー','completed','4','sonnet','33.7k','07-18 16:44→18:12','C:\\develop\\mvmaker'],
  ];
  const tr = r=>`<tr>
    <td><div class="st">${r[0]}</div><div class="sub">目的: ${r[1]}</div></td>
    <td><span class="pill ${r[2]}">${r[2]==='active'?'継続中':'完了'}</span></td>
    <td class="num">P${r[3]}</td>
    <td class="sub">${r[4]}</td>
    <td class="num">${r[5]}</td>
    <td class="sub">${r[6]}</td>
    <td class="sub mono">${r[7]}</td>
  </tr>`;
  return `<div class="sessions">
    <div class="shead"><h2>過去セッション</h2><span class="ro">読み取り専用</span>
      <input placeholder="🔍 目的・タイトル・フォルダで検索"></div>
    <div class="stable"><table>
      <thead><tr><th>タイトル / 目的</th><th>状態</th><th>ペイン</th><th>モデル</th><th>累計トークン</th><th>期間</th><th>cwd</th></tr></thead>
      <tbody>${rows.map(tr).join('')}</tbody>
    </table></div>
  </div>`;
}

/* ============ terminal content snippets ============ */
const T = {
  launching: [

/* ============ nav ============ */
let idx = 0;
const dotsEl = document.getElementById('dots');
scenes.forEach((_,i)=>{ const d=document.createElement('i'); d.onclick=()=>go(i); dotsEl.appendChild(d); });
function go(i){
  idx = (i+scenes.length)%scenes.length;
  const sc = scenes[idx];
  render({...sc, view:sc.view||'grid'});
  document.getElementById('cap-badge').textContent = sc.m;
  document.getElementById('cap-title').textContent = sc.title;
  document.getElementById('cap-desc').textContent = sc.desc;
  document.getElementById('counter').textContent = (idx+1)+' / '+scenes.length;
  [...dotsEl.children].forEach((d,j)=>d.classList.toggle('on', j===idx));
}
document.getElementById('prev').onclick=()=>{stopPlay();go(idx-1);};
document.getElementById('next').onclick=()=>{stopPlay();go(idx+1);};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){stopPlay();go(idx-1);}
  if(e.key==='ArrowRight'||e.key===' '){stopPlay();go(idx+1);}
});

/* autoplay: 5秒ごとに次のシーンへ（もう一度押すと停止） */
let timer=null;
const playBtn=document.getElementById('play');
function stopPlay(){ if(timer){clearInterval(timer);timer=null;playBtn.textContent='▶ 自動再生';} }
playBtn.onclick=()=>{
  if(timer){ stopPlay(); return; }
  playBtn.textContent='■ 停止';
  go(idx+1);
  timer=setInterval(()=>go(idx+1),5000);
};
go(0);
